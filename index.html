<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic - Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; width: 320px; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .hidden-tab { display: none; }
        .product-card img { height: 180px; width: 100%; object-fit: cover; }
        .modal-blur { display: none; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1100; }
        .cart-drawer { transition: transform 0.3s ease; z-index: 1050; }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-100 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-blue-600 p-2"><i class="fas fa-bars-staggered text-xl"></i></button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-black italic shadow-lg">B</div>
                    <span class="font-black text-sm uppercase tracking-tighter">Biip Aquatic</span>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative text-slate-700">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full sidebar bg-white -translate-x-full shadow-2xl flex flex-col pt-16">
        <div class="p-6">
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                <input type="text" id="searchInput" onkeyup="liveSearch()" placeholder="Cari ikan, size, atau jenis..." class="w-full pl-9 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-xs outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div class="flex border-b text-[10px] font-black uppercase tracking-widest mb-6">
                <button onclick="switchTab('nav')" id="btn-nav" class="flex-1 py-4 tab-active">Menu</button>
                <button onclick="switchTab('kat')" id="btn-kat" class="flex-1 py-4 text-slate-400">Kategori</button>
            </div>

            <nav id="tab-nav" class="space-y-1">
                <button onclick="scrollToId('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl font-bold text-xs uppercase flex items-center gap-3"><i class="fas fa-home w-4 text-blue-500"></i> Beranda</button>
                <button onclick="scrollToId('katalog')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl font-bold text-xs uppercase flex items-center gap-3"><i class="fas fa-fish w-4 text-blue-500"></i> Produk</button>
                <button onclick="scrollToId('artikel')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl font-bold text-xs uppercase flex items-center gap-3"><i class="fas fa-newspaper w-4 text-blue-500"></i> Artikel</button>
                <button onclick="scrollToId('footer')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl font-bold text-xs uppercase flex items-center gap-3"><i class="fas fa-info-circle w-4 text-blue-500"></i> Kontak</button>
                
                <div class="mt-10 border-t pt-6">
                    <button onclick="openModal('auth')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg">
                        <i class="fas fa-user-circle"></i> Login Akun
                    </button>
                </div>
            </nav>

            <div id="tab-kat" class="hidden-tab grid grid-cols-2 gap-2">
                </div>
        </div>
    </aside>

    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl cart-drawer translate-x-full flex flex-col p-6 pt-20">
        <h3 class="font-black uppercase italic mb-6 border-b pb-4">Pesanan Anda</h3>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="border-t pt-4">
            <div class="flex justify-between font-black mb-4"><span>TOTAL:</span><span id="cart-total" class="text-blue-600">Rp 0</span></div>
            <button onclick="checkoutWA()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-xs tracking-widest uppercase shadow-lg flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-lg"></i> Pesan via WA
            </button>
        </div>
    </div>

    <main class="mt-16">
        <section id="home" class="h-[450px] bg-slate-900 flex items-center px-8 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-5xl font-black uppercase mb-2 tracking-tighter italic leading-none">High Quality<br>Flowerhorn</h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.4em] mb-10 text-blue-400">Premium Aquatic Specialist</p>
                <button onclick="scrollToId('katalog')" class="bg-blue-600 px-10 py-4 rounded-2xl text-[10px] font-black tracking-widest uppercase shadow-2xl">Jelajahi Koleksi</button>
            </div>
            <img src="https://images.unsplash.com/photo-1524704659690-3f7a3fe19bb7?q=80&w=1200" class="absolute inset-0 w-full h-full object-cover opacity-50">
        </section>

        <section id="katalog" class="px-4 max-w-7xl mx-auto py-20">
            <div class="flex items-center gap-4 mb-10">
                <div class="h-8 w-2 bg-blue-600"></div>
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Katalog <span class="text-blue-600">Ikan</span></h2>
            </div>
            <div id="grid-ikan" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="artikel" class="bg-slate-50 py-20 px-4">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-2xl font-black uppercase italic text-center mb-16">Eduasi <span class="text-blue-600">Terbaru</span></h2>
                <div id="grid-artikel" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </div>
        </section>
    </main>

    <footer id="footer" class="bg-slate-900 text-white py-16 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-white/5 pb-12">
            <div>
                <h4 class="text-blue-500 font-black text-[10px] uppercase tracking-widest mb-6 italic italic">Metode Pembayaran</h4>
                <div class="flex gap-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="h-4 bg-white p-1 rounded">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dan_motto_DANA.png" class="h-4 bg-white p-1 rounded">
                </div>
            </div>
            <div>
                <h4 class="text-blue-500 font-black text-[10px] uppercase tracking-widest mb-6 italic italic">Ekspedisi</h4>
                <div class="flex flex-wrap gap-4 opacity-70 contrast-125">
                    <img src="https://upload.wikimedia.org/wikipedia/id/8/82/JNE_Express_logo.svg" class="h-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/J%26T_Express_logo.svg" class="h-4">
                    <span class="text-[9px] font-black border border-white/30 px-2 py-1 rounded">PAXEL</span>
                    <span class="text-[9px] font-black border border-white/30 px-2 py-1 rounded">TIKI</span>
                </div>
            </div>
            <div>
                <h4 class="text-blue-500 font-black text-[10px] uppercase tracking-widest mb-6 italic italic">Kontak Kami</h4>
                <p class="text-xs font-bold">WhatsApp: 0857 1684 2806</p>
                <p class="text-[10px] opacity-40 uppercase tracking-widest mt-2">Official Pandeglang - Banten</p>
            </div>
        </div>
    </footer>

    <div id="auth-modal" class="fixed inset-0 modal-blur flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 relative shadow-2xl">
            <button onclick="closeModal('auth')" class="absolute top-6 right-8 text-slate-300 text-xl font-bold">&times;</button>
            <h3 class="text-2xl font-black mb-8 uppercase italic italic">Login Member</h3>
            <input type="email" placeholder="Email Address" class="w-full bg-slate-50 p-4 rounded-2xl mb-4 text-xs border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" placeholder="Password" class="w-full bg-slate-50 p-4 rounded-2xl mb-8 text-xs border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500">
            <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Masuk</button>
        </div>
    </div>

    <div id="art-modal" class="fixed inset-0 modal-blur flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[32px] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl">
            <div id="art-content" class="p-8 overflow-y-auto"></div>
            <button onclick="closeModal('art')" class="m-8 bg-slate-900 text-white py-4 rounded-2xl font-bold text-xs uppercase">Tutup</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbweN3RsahvKBmbP4RzfT02yaEQiQOzAiaL9FT6ywMyg0r5l5I8LfNEb2lV3vQHwLltkaQ/exec";
        let store = { produk: [], artikel: [] };
        let cart = [];

        async function init() {
            const script = document.createElement('script');
            script.src = `${API}?callback=render`;
            document.body.appendChild(script);
        }

        function render(data) {
            store = data;
            drawItems(data.produk);
            drawArticles(data.artikel);
            drawKat(data.produk);
        }

        function fixImg(url) {
            let id = ""; let s = String(url || "");
            if (s.indexOf("id=") !== -1) id = s.split("id=")[1].split("&")[0];
            else if (s.indexOf("/d/") !== -1) id = s.split("/d/")[1].split("/")[0];
            return id ? `https://drive.google.com/uc?export=view&id=${id}` : s;
        }

        function drawItems(items) {
            document.getElementById('grid-ikan').innerHTML = items.map((p, i) => `
                <div class="bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm hover:shadow-2xl transition duration-500 group">
                    <div class="overflow-hidden h-44">
                        <img src="${fixImg(p.foto)}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <div class="p-6">
                        <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">${p.kategori}</span>
                        <h4 class="font-bold text-[12px] uppercase truncate mb-1 mt-1">${p.nama}</h4>
                        <p class="text-[9px] text-slate-400 font-bold mb-4">${p.jenis}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                            <span class="text-sm font-black italic">Rp ${Number(p.harga).toLocaleString('id-ID')}</span>
                            <button onclick="addCart(${i})" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-blue-600 transition shadow-lg"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function drawArticles(items) {
            document.getElementById('grid-artikel').innerHTML = items.map((a, i) => `
                <div onclick="openArt(${i})" class="bg-white p-6 rounded-[2rem] border border-slate-100 flex gap-6 hover:shadow-xl transition-all cursor-pointer group">
                    <img src="${fixImg(a.foto)}" class="w-24 h-24 object-cover rounded-2xl shadow-md group-hover:rotate-3 transition">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-black text-[12px] uppercase mb-2 group-hover:text-blue-600 transition">${a.judul}</h4>
                        <p class="text-[10px] text-slate-500 line-clamp-2 leading-relaxed">${a.isi}</p>
                    </div>
                </div>
            `).join('');
        }

        function drawKat(items) {
            const cats = [...new Set(items.map(x => x.kategori))];
            document.getElementById('tab-kat').innerHTML = cats.map(c => `
                <button onclick="filterK('${c}')" class="p-4 bg-slate-50 border border-slate-100 rounded-2xl text-[9px] font-black uppercase text-slate-400 hover:bg-blue-600 hover:text-white transition shadow-sm">${c}</button>
            `).join('');
        }

        // PENCARIAN OTOMATIS (LIVE)
        function liveSearch() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = store.produk.filter(p => p.nama.toLowerCase().includes(val) || p.jenis.toLowerCase().includes(val) || p.kategori.toLowerCase().includes(val));
            drawItems(filtered);
        }

        // KERANJANG BELANJA
        function addCart(idx) {
            cart.push(store.produk[idx]);
            updateCart();
            toggleCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map((p, i) => `
                <div class="flex gap-4 items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <img src="${fixImg(p.foto)}" class="w-12 h-12 object-cover rounded-xl">
                    <div class="flex-1">
                        <p class="text-[10px] font-black uppercase truncate mb-1">${p.nama}</p>
                        <p class="text-xs font-black text-blue-600">Rp ${Number(p.harga).toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="delCart(${i})" class="text-red-400 p-2"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>
            `).join('');
            const total = cart.reduce((s, x) => s + Number(x.harga), 0);
            document.getElementById('cart-total').innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function delCart(i) { cart.splice(i, 1); updateCart(); }
        function checkoutWA() {
            if(cart.length === 0) return alert('Keranjang belanja kosong!');
            let msg = "Halo Admin BIIP, saya ingin memesan:\n\n";
            cart.forEach((p, i) => msg += `${i+1}. ${p.nama} (Rp ${Number(p.harga).toLocaleString('id-ID')})\n`);
            msg += `\nTOTAL PESANAN: Rp ${cart.reduce((s, x) => s + Number(x.harga), 0).toLocaleString('id-ID')}`;
            window.open(`https://wa.me/6285716842806?text=${encodeURIComponent(msg)}`);
        }

        // NAVIGATION & UI
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('translate-x-full'); }
        function openModal(id) { document.getElementById(id+'-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id+'-modal').style.display = 'none'; }
        function switchTab(id) {
            document.getElementById('tab-nav').classList.toggle('hidden-tab', id !== 'nav');
            document.getElementById('tab-kat').classList.toggle('hidden-tab', id !== 'kat');
            document.getElementById('btn-nav').classList.toggle('tab-active', id === 'nav');
            document.getElementById('btn-kat').classList.toggle('tab-active', id === 'kat');
        }
        function filterK(c) { drawItems(store.produk.filter(x => x.kategori === c)); scrollToId('katalog'); toggleSidebar(); }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); if(window.innerWidth < 768) toggleSidebar(); }
        function openArt(idx) {
            const a = store.artikel[idx];
            document.getElementById('art-content').innerHTML = `
                <img src="${fixImg(a.foto)}" class="w-full h-64 object-cover rounded-[2rem] mb-8 shadow-xl">
                <h2 class="text-2xl font-black uppercase italic italic mb-4 border-l-8 border-blue-600 pl-4">${a.judul}</h2>
                <div class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap">${a.isi}</div>`;
            openModal('art');
        }

        window.onload = init;
    </script>
</body>
</html>
