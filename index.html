<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic | Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { transition: transform 0.3s ease-in-out; z-index: 1000; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="text-slate-800">

    <header class="fixed top-0 w-full bg-white shadow-sm z-50">
        <div class="bg-blue-50 py-3 px-5 flex justify-between items-center border-b border-blue-100">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-blue-600 text-2xl p-2 rounded-lg hover:bg-blue-100 transition">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">B</div>
                    <span class="font-bold text-blue-900 tracking-tighter uppercase">Biip Flowerhorn</span>
                </div>
            </div>
            <div class="text-blue-600 relative cursor-pointer">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] rounded-full px-1.5 font-bold border-2 border-white">0</span>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white sidebar -translate-x-full shadow-2xl overflow-y-auto">
        <div class="p-5 border-b flex justify-between items-center bg-slate-50">
            <span class="font-bold text-slate-700 uppercase text-xs tracking-widest">Navigasi</span>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div class="flex border-b text-center cursor-pointer">
            <div onclick="switchTab('menu')" id="btn-menu" class="flex-1 py-4 text-xs uppercase tracking-wider tab-active">Menu</div>
            <div onclick="switchTab('kategori')" id="btn-kategori" class="flex-1 py-4 text-xs uppercase tracking-wider text-slate-400">Kategori</div>
        </div>
        
        <div id="content-menu" class="p-4 space-y-1">
            <a href="#" class="flex items-center gap-4 p-4 hover:bg-blue-50 rounded-xl transition font-medium text-slate-600">
                <i class="fas fa-home text-blue-500"></i> Beranda
            </a>
            <a href="#" class="flex items-center gap-4 p-4 hover:bg-blue-50 rounded-xl transition font-medium text-slate-600">
                <i class="fas fa-fish text-blue-500"></i> Produk
            </a>
            <a href="#" class="flex items-center gap-4 p-4 hover:bg-blue-50 rounded-xl transition font-medium text-slate-600">
                <i class="fas fa-info-circle text-blue-500"></i> Tentang Kami
            </a>
        </div>

        <div id="content-kategori" class="hidden p-4 space-y-1">
            <button onclick="filterKategori('all')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl text-slate-600">Semua Ikan</button>
            <button onclick="filterKategori('Ikan A')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl text-slate-600">Ikan A</button>
            <button onclick="filterKategori('Ikan B')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl text-slate-600">Ikan B</button>
            <button onclick="filterKategori('Ikan C')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl text-slate-600">Ikan C</button>
        </div>
    </aside>

    <main class="mt-20 px-4 max-w-7xl mx-auto pb-20">
        <div class="mb-6 relative">
            <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
            <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Cari ikan kesukaanmu..." 
                class="w-full pl-12 pr-4 py-3 bg-white rounded-xl border border-slate-200 shadow-sm outline-none focus:ring-2 focus:ring-blue-400 transition-all">
        </div>

        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div id="loading" class="col-span-full text-center py-20">
                <i class="fas fa-circle-notch animate-spin text-3xl text-blue-500"></i>
                <p class="mt-4 text-slate-500 font-medium">Memuat Data Ikan...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t mt-10 p-8 text-center sm:text-left">
        <div class="max-w-7xl mx-auto grid sm:grid-cols-3 gap-8 text-sm text-slate-500">
            <div class="space-y-2">
                <h4 class="font-bold text-slate-800">BIIP FLOWERHORN</h4>
                <p>Budidaya, edukasi, dan penjualan ikan hias air tawar berkualitas.</p>
                <p class="text-xs italic">Pandeglang, Banten</p>
            </div>
            <div>
                <h4 class="font-bold text-slate-800 mb-2">PEMBAYARAN</h4>
                <div class="flex justify-center sm:justify-start gap-4 text-xl text-blue-600">
                    <i class="fas fa-university"></i> <i class="fas fa-wallet"></i>
                </div>
            </div>
            <div>
                <h4 class="font-bold text-slate-800 mb-2">BANTUAN</h4>
                <p>WA: 085716842806</p>
                <p>Garansi Ikan Hidup</p>
            </div>
        </div>
    </footer>

    <a href="https://wa.me/6285716842806" target="_blank" class="fixed bottom-6 right-6 w-14 h-14 bg-green-500 text-white rounded-full flex items-center justify-center text-2xl shadow-xl hover:scale-110 transition-all z-50">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // LINK TERBARU ANDA SUDAH SAYA PASANG DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbwlXC_fC2U6CVhUNxqghN1rBiS1VMDvtjuJlIEzFr5KceNx_W8iMepHWVwMSJerzahP/exec";
        let allProducts = [];

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerHTML = "<p class='text-red-500'>Gagal memuat data. Coba refresh halaman.</p>";
            }
        }

        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';

            if (data.length === 0) {
                grid.innerHTML = "<p class='col-span-full text-center py-10 text-slate-400'>Ikan tidak ditemukan.</p>";
                return;
            }

            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <div class="h-40 md:h-48 bg-slate-100 relative">
                        <img src="${p.foto}" onerror="this.src='https://via.placeholder.com/400x400?text=Biip+Aquatic'" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 bg-blue-600 text-white text-[9px] font-bold px-2 py-1 rounded uppercase shadow-md">
                            ${p.kategori || 'Ikan'}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-slate-800 text-xs uppercase line-clamp-1 mb-1">${p.nama}</h3>
                        <p class="text-[10px] text-blue-500 font-bold mb-3 uppercase tracking-tighter">${p.jenis || '-'}</p>
                        <div class="flex justify-between items-center">
                            <span class="font-black text-slate-900 text-sm">Rp ${Number(p.harga).toLocaleString('id-ID')}</span>
                            <button onclick="window.open('https://wa.me/6285716842806?text=Halo Admin Biip, saya berminat dengan ${p.nama}')" 
                                class="bg-blue-100 text-blue-600 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function switchTab(tab) {
            const btnMenu = document.getElementById('btn-menu');
            const btnKat = document.getElementById('btn-kategori');
            const contentMenu = document.getElementById('content-menu');
            const contentKat = document.getElementById('content-kategori');

            if(tab === 'menu') {
                btnMenu.classList.add('tab-active'); btnKat.classList.remove('tab-active');
                contentMenu.classList.remove('hidden'); contentKat.classList.add('hidden');
            } else {
                btnKat.classList.add('tab-active'); btnMenu.classList.remove('tab-active');
                contentKat.classList.remove('hidden'); contentMenu.classList.add('hidden');
            }
        }

        function searchProduct() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.nama.toLowerCase().includes(query) || p.kategori.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function filterKategori(kat) {
            const filtered = kat === 'all' ? allProducts : allProducts.filter(p => p.kategori === kat);
            renderProducts(filtered);
            toggleSidebar();
        }

        window.onload = fetchData;
    </script>
</body>
</html>
