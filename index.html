<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic | Official Branch Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .tab-btn { position: relative; transition: all 0.3s; color: #94a3b8; font-weight: 700; font-size: 11px; letter-spacing: 0.1em; }
        .tab-btn.active { color: #2563eb; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #2563eb; border-radius: 3px 3px 0 0; }
        .product-card { border-radius: 16px; border: 1px solid #f1f5f9; overflow: hidden; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border-color: #dbeafe; }
        .search-box { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 12px; transition: 0.3s; }
        .search-box:focus-within { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .badge-new { background: linear-gradient(45deg, #2563eb, #3b82f6); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-[60] border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-blue-600 p-2 hover:bg-blue-50 rounded-xl transition">
                    <i class="fas fa-bars-staggered text-xl"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-100">B</div>
                    <div class="flex flex-col leading-none">
                        <span class="text-[12px] font-extrabold uppercase tracking-tighter">Biip Flowerhorn</span>
                        <span class="text-[8px] text-blue-500 font-bold uppercase tracking-[0.2em] mt-1">Aquatic Branch</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center hover:text-blue-600 transition">
                    <i class="fas fa-shopping-cart text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white sidebar -translate-x-full shadow-2xl flex flex-col pt-4">
        <div class="px-6 py-4 flex items-center justify-between">
            <span class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">Navigation</span>
            <button onclick="toggleSidebar()" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-times"></i></button>
        </div>

        <div class="px-5 mb-4">
            <div class="search-box flex items-center px-4 py-2.5">
                <i class="fas fa-search text-slate-300 text-xs"></i>
                <input type="text" id="sideSearch" onkeyup="handleSearch()" placeholder="Cari ikan..." class="w-full bg-transparent border-none outline-none px-3 text-xs font-semibold">
            </div>
        </div>
        
        <div class="flex border-b">
            <button onclick="switchTab('menu')" id="btn-tab-menu" class="tab-btn active flex-1 py-4 uppercase">Menu Utama</button>
            <button onclick="switchTab('kat')" id="btn-tab-kat" class="tab-btn flex-1 py-4 uppercase">Kategori</button>
        </div>

        <div id="content-tab-menu" class="p-5 space-y-2 overflow-y-auto">
            <button onclick="setView('katalog')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl font-bold flex items-center gap-4 text-slate-700 transition group">
                <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition">
                    <i class="fas fa-th-large text-xs"></i>
                </div>
                <span class="text-sm">Katalog Produk</span>
            </button>
            <button onclick="setView('artikel')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl font-bold flex items-center gap-4 text-slate-700 transition group">
                <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition">
                    <i class="fas fa-newspaper text-xs"></i>
                </div>
                <span class="text-sm">Edukasi & Info</span>
            </button>
        </div>

        <div id="content-tab-kat" class="hidden p-5 space-y-1 overflow-y-auto">
            <div id="dynamic-kategori"></div>
        </div>
    </aside>

    <main class="mt-24 px-4 max-w-7xl mx-auto pb-24">
        
        <div id="view-katalog">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-xl font-black uppercase tracking-tighter">Koleksi <span class="text-blue-600">Ikan</span></h2>
                    <div class="h-1 w-12 bg-blue-600 rounded-full mt-1"></div>
                </div>
            </div>
            <div id="grid-ikan" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                </div>
        </div>

        <div id="view-artikel" class="hidden">
            <div class="text-center mb-12">
                <h2 class="text-xl font-black uppercase tracking-tighter">Edukasi & <span class="text-blue-600">Informasi</span></h2>
                <p class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Wawasan seputar dunia aquatic</p>
            </div>
            <div id="grid-artikel" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>

    </main>

    <div id="artModal" class="fixed inset-0 bg-slate-900/60 z-[100] hidden backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[32px] max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 overflow-y-auto" id="artContent"></div>
            <div class="p-6 border-t bg-slate-50 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-100">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwUoPA4WGaBvYS_gMAa4_MEPRK_YQJIb0Xikf7uEBcQwKPmZCjzyVON6l4Q1gUMfVjAxA/exec";
        let store = { produk: [], artikel: [] };

        async function init() {
            const script = document.createElement('script');
            script.src = `${API}?callback=render`;
            document.body.appendChild(script);
        }

        function render(data) {
            store = data;
            drawIkan(data.produk);
            drawArtikel(data.artikel);
            drawKategori(data.produk);
        }

        function drawIkan(items) {
            const grid = document.getElementById('grid-ikan');
            if(!items || items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-bold text-[10px] uppercase tracking-widest">Data Tidak Ditemukan</div>`;
                return;
            }
            grid.innerHTML = items.map(p => `
                <div class="product-card group">
                    <div class="h-44 md:h-60 relative overflow-hidden bg-slate-100">
                        <img src="${p.foto}" onerror="this.src='https://via.placeholder.com/500?text=Biip+Aquatic'" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute top-3 left-3 badge-new text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase tracking-widest shadow-lg">${p.kategori}</div>
                        ${p.stock < 1 ? '<div class="absolute inset-0 bg-white/80 flex items-center justify-center text-slate-900 font-black text-[10px] uppercase tracking-[0.2em] backdrop-blur-[2px]">Habis Terjual</div>' : ''}
                    </div>
                    <div class="p-4 bg-white">
                        <h3 class="font-bold text-slate-800 text-[11px] md:text-xs uppercase truncate mb-1 tracking-tight">${p.nama}</h3>
                        <p class="text-[9px] text-blue-500 font-bold mb-4 uppercase tracking-widest">${p.jenis || '-'}</p>
                        <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                            <div>
                                <p class="text-[7px] text-slate-400 font-bold uppercase mb-0.5">Price</p>
                                <div class="text-[13px] md:text-sm font-black text-slate-900">Rp ${Number(p.harga).toLocaleString('id-ID')}</div>
                            </div>
                            <button onclick="buyWA('${p.nama}')" class="w-9 h-9 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-blue-100 hover:bg-slate-900 transition-all">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function drawArtikel(items) {
            const grid = document.getElementById('grid-artikel');
            grid.innerHTML = items.map((a, i) => `
                <div onclick="openArt(${i})" class="bg-white p-5 rounded-3xl border border-slate-100 flex gap-5 cursor-pointer hover:border-blue-200 transition-all group">
                    <img src="${a.foto}" class="w-24 h-24 md:w-32 md:h-32 object-cover rounded-2xl shadow-sm group-hover:scale-105 transition">
                    <div class="flex-1">
                        <h3 class="font-black text-slate-800 text-xs md:text-sm uppercase mb-3 leading-tight group-hover:text-blue-600 transition">${a.judul}</h3>
                        <p class="text-[10px] md:text-xs text-slate-500 line-clamp-2 leading-relaxed mb-4">${a.isi}</p>
                        <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">Baca Detail <i class="fas fa-chevron-right ml-1"></i></span>
                    </div>
                </div>
            `).join('');
        }

        function drawKategori(produk) {
            const cats = [...new Set(produk.map(p => p.kategori))];
            document.getElementById('dynamic-kategori').innerHTML = `
                <button onclick="filterKat('all')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-slate-600 text-xs uppercase tracking-widest transition">Semua Koleksi</button>
                ${cats.map(c => `<button onclick="filterKat('${c}')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-slate-600 text-xs uppercase tracking-widest transition border-t border-slate-50">${c}</button>`).join('')}
            `;
        }

        function openArt(idx) {
            const a = store.artikel[idx];
            document.getElementById('artContent').innerHTML = `
                <img src="${a.foto}" class="w-full h-64 object-cover rounded-3xl mb-8 shadow-xl">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter mb-4">${a.judul}</h2>
                <div class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap">${a.isi}</div>
            `;
            document.getElementById('artModal').classList.remove('hidden');
        }

        function switchTab(t) {
            const isMenu = t === 'menu';
            document.getElementById('btn-tab-menu').className = isMenu ? 'tab-btn active flex-1 py-4 uppercase' : 'tab-btn flex-1 py-4 uppercase';
            document.getElementById('btn-tab-kat').className = !isMenu ? 'tab-btn active flex-1 py-4 uppercase' : 'tab-btn flex-1 py-4 uppercase';
            document.getElementById('content-tab-menu').classList.toggle('hidden', !isMenu);
            document.getElementById('content-tab-kat').classList.toggle('hidden', isMenu);
        }

        function handleSearch() {
            const q = document.getElementById('sideSearch').value.toLowerCase();
            const f = store.produk.filter(p => p.nama.toLowerCase().includes(q));
            drawIkan(f);
            if(document.getElementById('view-katalog').classList.contains('hidden')) setView('katalog');
        }

        function filterKat(c) {
            const f = c === 'all' ? store.produk : store.produk.filter(p => p.kategori === c);
            drawIkan(f);
            setView('katalog');
            toggleSidebar();
        }

        function setView(v) {
            document.getElementById('view-katalog').classList.toggle('hidden', v !== 'katalog');
            document.getElementById('view-artikel').classList.toggle('hidden', v !== 'artikel');
            if(v !== 'katalog') toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function closeModal() { document.getElementById('artModal').classList.add('hidden'); }
        function buyWA(name) { window.open(`https://wa.me/6285716842806?text=Halo Admin Biip, saya mau order: ${name}`); }

        window.onload = init;
    </script>
</body>
</html>
