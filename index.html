<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfc; color: #1e293b; margin: 0; }
        
        /* Navigasi Sidebar */
        .sidebar { transition: transform 0.3s ease; z-index: 1000; width: 300px; }
        .hidden-tab { display: none; }
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }

        /* Kategori Grid */
        .kat-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 10px; }
        
        /* Kartu Produk - Dikunci agar tidak raksasa */
        .product-card { background: white; border-radius: 20px; border: 1px solid #f1f5f9; overflow: hidden; transition: 0.3s; }
        .product-card:hover { shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 160px; object-fit: cover; }

        /* Keranjang */
        .cart-drawer { position: fixed; right: 0; top: 0; height: 100%; width: 300px; background: white; transform: translateX(100%); transition: 0.3s; z-index: 1100; box-shadow: -10px 0 20px rgba(0,0,0,0.05); }
        .cart-drawer.active { transform: translateX(0); }

        /* Modal Background */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1200; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-100 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-blue-600"><i class="fas fa-bars-staggered text-xl"></i></button>
                <span class="font-extrabold text-sm uppercase tracking-tighter text-slate-900">Biip Aquatic</span>
            </div>
            <button onclick="toggleCart()" class="relative text-slate-600 p-2">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full sidebar bg-white -translate-x-full shadow-2xl flex flex-col pt-16">
        <div class="p-6">
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                <input type="text" id="searchInput" onkeyup="liveSearch()" placeholder="Cari ikan atau size..." class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none focus:border-blue-500 transition">
            </div>
            
            <div class="flex border-b text-[10px] font-bold uppercase tracking-widest mb-6">
                <button onclick="switchTab('nav')" id="btn-nav" class="flex-1 py-3 tab-btn active">Menu</button>
                <button onclick="switchTab('kat')" id="btn-kat" class="flex-1 py-3 tab-btn text-slate-400">Kategori</button>
            </div>

            <nav id="tab-nav" class="space-y-1">
                <button onclick="scrollToId('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl font-bold text-xs uppercase"><i class="fas fa-home mr-3"></i> Beranda</button>
                <button onclick="scrollToId('katalog')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl font-bold text-xs uppercase"><i class="fas fa-fish mr-3"></i> Produk</button>
                <button onclick="scrollToId('artikel')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl font-bold text-xs uppercase"><i class="fas fa-newspaper mr-3"></i> Artikel</button>
                <button onclick="openModal('auth')" class="w-full mt-6 bg-slate-900 text-white p-4 rounded-xl font-bold text-[10px] uppercase tracking-widest"><i class="fas fa-user-circle mr-2"></i> Login Pembeli</button>
            </nav>

            <div id="tab-kat" class="hidden-tab kat-grid">
                </div>
        </div>
    </aside>

    <div id="cart-drawer" class="cart-drawer flex flex-col p-6">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h3 class="font-bold text-sm uppercase">Pesanan Anda</h3>
            <button onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="border-t pt-4">
            <div class="flex justify-between font-black text-sm mb-4"><span>TOTAL:</span><span id="cart-total" class="text-blue-600">Rp 0</span></div>
            <button onclick="checkoutWA()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest"><i class="fab fa-whatsapp mr-2"></i> Checkout WhatsApp</button>
        </div>
    </div>

    <main class="pt-16">
        <section id="home" class="h-[350px] bg-slate-900 flex items-center px-8 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-4xl font-black uppercase mb-2 tracking-tighter italic leading-none">High Quality<br>Flowerhorn</h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.3em] mb-6 text-blue-400">Official Branch Store Pandeglang</p>
                <button onclick="scrollToId('katalog')" class="bg-blue-600 px-8 py-3 rounded-lg text-[9px] font-black uppercase">Lihat Koleksi</button>
            </div>
            <img src="https://images.unsplash.com/photo-1524704659690-3f7a3fe19bb7?q=80&w=1200" class="absolute top-0 left-0 w-full h-full object-cover opacity-40">
        </section>

        <section id="katalog" class="px-4 max-w-7xl mx-auto py-12">
            <h2 class="text-lg font-black uppercase mb-6 italic border-l-4 border-blue-600 pl-4">Katalog <span class="text-blue-600">Ikan</span></h2>
            <div id="grid-ikan" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="artikel" class="bg-slate-50 py-12 px-4">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-lg font-black uppercase mb-8 italic text-center">Informasi <span class="text-blue-600">Perikanan</span></h2>
                <div id="grid-artikel" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 text-white py-12 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">
            <div>
                <h4 class="text-blue-500 font-bold text-[10px] uppercase tracking-widest mb-4">Pembayaran & Kurir</h4>
                <div class="flex flex-wrap gap-2 opacity-80">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="h-4 bg-white p-1 rounded">
                    <img src="https://upload.wikimedia.org/wikipedia/id/8/82/JNE_Express_logo.svg" class="h-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/J%26T_Express_logo.svg" class="h-4">
                </div>
            </div>
            <div class="text-xs">
                <h4 class="text-blue-500 font-bold text-[10px] uppercase tracking-widest mb-4">Kontak Kami</h4>
                <p>WA: 0857 1684 2806</p>
                <p class="opacity-50">Pandeglang, Banten</p>
            </div>
        </div>
    </footer>

    <div id="auth-modal" class="modal-overlay flex">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 relative">
            <button onclick="closeModal('auth')" class="absolute top-4 right-4 text-slate-300">×</button>
            <h3 class="text-xl font-black mb-6 uppercase italic">Login Akun</h3>
            <input type="email" placeholder="Email" class="w-full bg-slate-50 p-4 rounded-xl mb-3 text-xs border border-slate-100 outline-none">
            <input type="password" placeholder="Password" class="w-full bg-slate-50 p-4 rounded-xl mb-6 text-xs border border-slate-100 outline-none">
            <button class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-[10px] uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="art-modal" class="modal-overlay flex">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden flex flex-col max-h-[85vh]">
            <div id="artContent" class="p-8 overflow-y-auto"></div>
            <button onclick="closeModal('art')" class="m-6 bg-slate-900 text-white py-3 rounded-xl font-bold text-xs">Tutup</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbweN3RsahvKBmbP4RzfT02yaEQiQOzAiaL9FT6ywMyg0r5l5I8LfNEb2lV3vQHwLltkaQ/exec";
        let store = { produk: [], artikel: [] };
        let cart = [];

        async function init() {
            const script = document.createElement('script');
            script.src = `${API}?callback=setup`;
            document.body.appendChild(script);
        }

        function setup(data) {
            store = data;
            renderAll(data.produk, data.artikel);
            renderKat(data.produk);
        }

        function fixImg(url) {
            let id = ""; let s = String(url || "");
            if (s.indexOf("id=") !== -1) id = s.split("id=")[1].split("&")[0];
            else if (s.indexOf("/d/") !== -1) id = s.split("/d/")[1].split("/")[0];
            return id ? `https://drive.google.com/uc?export=view&id=${id}` : s;
        }

        function renderAll(prod, art) {
            document.getElementById('grid-ikan').innerHTML = prod.map((p, i) => `
                <div class="product-card">
                    <img src="${fixImg(p.foto)}" class="product-img">
                    <div class="p-4">
                        <h4 class="font-bold text-[10px] uppercase truncate mb-1">${p.nama}</h4>
                        <p class="text-[8px] text-blue-500 font-bold mb-3 uppercase">${p.jenis}</p>
                        <div class="flex justify-between items-center pt-2 border-t">
                            <span class="text-xs font-black italic">Rp${Number(p.harga).toLocaleString('id-ID')}</span>
                            <button onclick="addToCart(${i})" class="w-7 h-7 bg-slate-900 text-white rounded-lg text-[10px]"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('grid-artikel').innerHTML = art.map((a, i) => `
                <div onclick="openArt(${i})" class="bg-white p-3 rounded-2xl border border-slate-100 flex gap-4 cursor-pointer hover:border-blue-200">
                    <img src="${fixImg(a.foto)}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-[10px] uppercase truncate">${a.judul}</h4>
                        <p class="text-[9px] text-slate-500 line-clamp-2">${a.isi}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderKat(items) {
            const cats = [...new Set(items.map(x => x.kategori))];
            document.getElementById('tab-kat').innerHTML = cats.map(c => `
                <button onclick="filterK('${c}')" class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-[8px] font-bold uppercase text-slate-400 hover:bg-blue-600 hover:text-white transition">${c}</button>
            `).join('');
        }

        function liveSearch() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = store.produk.filter(p => p.nama.toLowerCase().includes(val) || p.jenis.toLowerCase().includes(val));
            renderAll(filtered, store.artikel);
        }

        function addToCart(idx) {
            cart.push(store.produk[idx]);
            updateCart();
            document.getElementById('cart-drawer').classList.add('active');
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map((p, i) => `
                <div class="flex gap-3 items-center bg-slate-50 p-3 rounded-xl">
                    <img src="${fixImg(p.foto)}" class="w-10 h-10 object-cover rounded-lg">
                    <div class="flex-1">
                        <p class="text-[9px] font-bold uppercase truncate">${p.nama}</p>
                        <p class="text-[10px] font-black text-blue-600">Rp ${Number(p.harga).toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="removeCart(${i})" class="text-red-400 p-2 text-xs"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = "Rp " + cart.reduce((s, x) => s + Number(x.harga), 0).toLocaleString('id-ID');
        }

        function removeCart(i) { cart.splice(i, 1); updateCart(); }
        function checkoutWA() {
            if(cart.length === 0) return;
            let msg = "Halo Admin BIIP, saya ingin pesan:\n";
            cart.forEach((p, i) => msg += `${i+1}. ${p.nama} (Rp ${Number(p.harga).toLocaleString('id-ID')})\n`);
            window.open(`https://wa.me/6285716842806?text=${encodeURIComponent(msg)}`);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('active'); }
        function openModal(id) { document.getElementById(id+'-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id+'-modal').style.display = 'none'; }
        function switchTab(id) {
            document.getElementById('tab-nav').classList.toggle('hidden-tab', id !== 'nav');
            document.getElementById('tab-kat').classList.toggle('hidden-tab', id !== 'kat');
            document.getElementById('btn-nav').classList.toggle('active', id === 'nav');
            document.getElementById('btn-kat').classList.toggle('active', id === 'kat');
        }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); toggleSidebar(); }
        function openArt(idx) {
            const a = store.artikel[idx];
            document.getElementById('artContent').innerHTML = `<img src="${fixImg(a.foto)}" class="w-full h-48 object-cover rounded-2xl mb-4 shadow-md"><h2 class="text-lg font-black uppercase mb-3 italic">${a.judul}</h2><p class="text-slate-600 text-sm leading-relaxed">${a.isi}</p>`;
            openModal('art');
        }

        window.onload = init;
    </script>
</body>
</html>
