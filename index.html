<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #ffffff; }
        
        /* Sidebar & Keranjang tetapkan di posisi yang benar */
        #sidebar { transition: transform 0.3s ease; z-index: 1000; width: 280px; }
        #cart-drawer { transition: transform 0.3s ease; z-index: 1000; width: 300px; }
        
        /* Grid Produk yang stabil agar tidak berantakan */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        
        /* Gambar Produk Terkunci Proporsinya */
        .img-container { aspect-ratio: 1/1; overflow: hidden; border-radius: 1rem; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .active-tab { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .hidden-tab { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="fixed top-0 w-full bg-white border-b border-gray-100 z-50 h-16 flex justify-between items-center px-4">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-blue-600"><i class="fas fa-bars text-xl"></i></button>
            <span class="font-bold text-gray-900 tracking-tight">BIIP AQUATIC</span>
        </div>
        <button onclick="toggleCart()" class="relative p-2 text-gray-600">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">0</span>
        </button>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full bg-white -translate-x-full shadow-xl flex flex-col pt-16">
        <div class="px-6 py-4">
            <input type="text" id="searchInput" onkeyup="doSearch()" placeholder="Cari ikan..." class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-sm outline-none">
        </div>
        <div class="flex border-b text-xs font-bold text-center">
            <button onclick="showTab('menu')" id="btn-menu" class="flex-1 py-4 active-tab">MENU</button>
            <button onclick="showTab('kat')" id="btn-kat" class="flex-1 py-4 text-gray-400">KATEGORI</button>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
            <div id="tab-menu" class="space-y-4">
                <a href="#home" class="block font-semibold text-gray-700">Beranda</a>
                <a href="#katalog" class="block font-semibold text-gray-700">Katalog Ikan</a>
                <a href="#artikel" class="block font-semibold text-gray-700">Artikel</a>
                <div class="pt-8">
                    <button onclick="alert('Fungsi Login Aktif')" class="w-full bg-gray-900 text-white py-3 rounded-xl text-xs font-bold">LOGIN PEMBELI</button>
                </div>
            </div>
            <div id="tab-kat" class="hidden-tab grid grid-cols-2 gap-2">
                </div>
        </div>
    </aside>

    <div id="cart-drawer" class="fixed top-0 right-0 h-full bg-white translate-x-full shadow-xl flex flex-col p-6 pt-16">
        <h3 class="font-bold mb-6 border-b pb-2">Keranjang Belanja</h3>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="border-t pt-4">
            <div class="flex justify-between font-bold mb-4"><span>Total:</span><span id="cart-total" class="text-blue-600">Rp 0</span></div>
            <button onclick="checkoutWA()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold uppercase text-xs">Pesan via WhatsApp</button>
        </div>
    </div>

    <main class="mt-16">
        <section id="home" class="h-64 bg-slate-900 relative flex items-center px-6">
            <div class="relative z-10 text-white">
                <h1 class="text-3xl font-black uppercase italic">Biip Flowerhorn</h1>
                <p class="text-xs tracking-widest text-blue-400">Official Pandeglang Branch</p>
            </div>
            <img src="https://images.unsplash.com/photo-1524704659690-3f7a3fe19bb7?q=80&w=800" class="absolute inset-0 w-full h-full object-cover opacity-30">
        </section>

        <section id="katalog" class="p-4 max-w-7xl mx-auto py-10">
            <h2 class="font-bold text-lg mb-6 border-l-4 border-blue-600 pl-3 uppercase">Produk Terbaru</h2>
            <div id="grid-produk" class="product-grid">
                </div>
        </section>

        <section id="artikel" class="bg-gray-50 p-4 py-10">
            <div class="max-w-7xl mx-auto">
                <h2 class="font-bold text-lg mb-6 text-center uppercase">Artikel & Edukasi</h2>
                <div id="grid-artikel" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbweN3RsahvKBmbP4RzfT02yaEQiQOzAiaL9FT6ywMyg0r5l5I8LfNEb2lV3vQHwLltkaQ/exec";
        let master = { produk: [], artikel: [] };
        let keranjang = [];

        async function init() {
            const script = document.createElement('script');
            script.src = `${API}?callback=render`;
            document.body.appendChild(script);
        }

        function render(data) {
            master = data;
            drawProduk(data.produk);
            drawArtikel(data.artikel);
            drawKategori(data.produk);
        }

        // Fungsi Gambar yang sudah diperbaiki agar tidak "hancur"
        function fixImg(url) {
            let id = ""; let s = String(url || "");
            if (s.indexOf("id=") !== -1) id = s.split("id=")[1].split("&")[0];
            else if (s.indexOf("/d/") !== -1) id = s.split("/d/")[1].split("/")[0];
            return id ? `https://drive.google.com/uc?export=view&id=${id}` : s;
        }

        function drawProduk(items) {
            document.getElementById('grid-produk').innerHTML = items.map((p, i) => `
                <div class="bg-white border border-gray-100 rounded-2xl p-3 shadow-sm">
                    <div class="img-container mb-3">
                        <img src="${fixImg(p.foto)}" loading="lazy">
                    </div>
                    <h4 class="font-bold text-xs truncate uppercase">${p.nama}</h4>
                    <p class="text-[10px] text-gray-400 mb-3">${p.jenis}</p>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-xs">Rp ${Number(p.harga).toLocaleString('id-ID')}</span>
                        <button onclick="tambahKeKeranjang(${i})" class="w-8 h-8 bg-blue-600 text-white rounded-lg"><i class="fas fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function drawArtikel(items) {
            document.getElementById('grid-artikel').innerHTML = items.map(a => `
                <div class="bg-white p-4 rounded-xl flex gap-4 border border-gray-100">
                    <img src="${fixImg(a.foto)}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="min-w-0">
                        <h4 class="font-bold text-xs uppercase truncate">${a.judul}</h4>
                        <p class="text-[10px] text-gray-500 line-clamp-2">${a.isi}</p>
                    </div>
                </div>
            `).join('');
        }

        function drawKategori(items) {
            const unik = [...new Set(items.map(x => x.kategori))];
            document.getElementById('tab-kat').innerHTML = unik.map(k => `
                <button onclick="filterKategori('${k}')" class="p-2 bg-gray-50 rounded-lg text-[10px] font-bold border border-gray-100 uppercase">${k}</button>
            `).join('');
        }

        function doSearch() {
            const key = document.getElementById('searchInput').value.toLowerCase();
            const filter = master.produk.filter(p => p.nama.toLowerCase().includes(key) || p.jenis.toLowerCase().includes(key));
            drawProduk(filter);
        }

        function tambahKeKeranjang(idx) {
            keranjang.push(master.produk[idx]);
            updateKeranjang();
            alert('Berhasil ditambah!');
        }

        function updateKeranjang() {
            document.getElementById('cart-count').innerText = keranjang.length;
            document.getElementById('cart-items').innerHTML = keranjang.map((p, i) => `
                <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-lg">
                    <img src="${fixImg(p.foto)}" class="w-10 h-10 object-cover rounded">
                    <div class="flex-1 min-w-0"><p class="text-[10px] font-bold truncate">${p.nama}</p></div>
                    <button onclick="hapusKeranjang(${i})" class="text-red-500"><i class="fas fa-trash text-xs"></i></button>
                </div>
            `).join('');
            const total = keranjang.reduce((s, x) => s + Number(x.harga), 0);
            document.getElementById('cart-total').innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function hapusKeranjang(i) { keranjang.splice(i, 1); updateKeranjang(); }
        function checkoutWA() {
            if(keranjang.length === 0) return;
            let teks = "Halo Biip Aquatic, saya mau pesan:\n";
            keranjang.forEach((p, i) => teks += `${i+1}. ${p.nama}\n`);
            window.open(`https://wa.me/6285716842806?text=${encodeURIComponent(teks)}`);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('translate-x-full'); }
        function showTab(t) {
            document.getElementById('tab-menu').classList.toggle('hidden-tab', t !== 'menu');
            document.getElementById('tab-kat').classList.toggle('hidden-tab', t !== 'kat');
            document.getElementById('btn-menu').classList.toggle('active-tab', t === 'menu');
            document.getElementById('btn-kat').classList.toggle('active-tab', t === 'kat');
        }
        function filterKategori(k) { drawProduk(master.produk.filter(x => x.kategori === k)); toggleSidebar(); }

        window.onload = init;
    </script>
</body>
</html>
