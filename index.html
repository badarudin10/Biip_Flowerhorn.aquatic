<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic | Official Branch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-slate-800">

    <header class="fixed top-0 w-full bg-white shadow-sm z-50">
        <div class="bg-blue-50/50 py-3 px-4 flex justify-between items-center border-b border-blue-100">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-blue-600 text-xl p-2 hover:bg-white rounded-xl transition">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-200">B</div>
                    <div class="flex flex-col leading-none">
                        <span class="font-extrabold text-blue-900 text-[11px] md:text-sm tracking-tighter uppercase">Biip Flowerhorn</span>
                        <span class="text-[8px] md:text-[10px] text-blue-500 font-bold uppercase tracking-widest">Aquatic Branch</span>
                    </div>
                </div>
            </div>
            
            <div class="text-blue-600 relative cursor-pointer p-2">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span class="absolute top-1 right-0 bg-red-500 text-white text-[9px] rounded-full px-1.5 font-bold border-2 border-white">0</span>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white sidebar -translate-x-full shadow-2xl overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <span class="font-bold text-[10px] uppercase tracking-[0.2em] text-slate-400">Main Explorer</span>
            <button onclick="toggleSidebar()" class="text-slate-300 hover:text-red-500 transition text-xl"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="flex border-b text-center cursor-pointer bg-white">
            <div onclick="switchTab('menu')" id="btn-menu" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest tab-active">Menu</div>
            <div onclick="switchTab('kategori')" id="btn-kategori" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-slate-400">Kategori</div>
        </div>
        
        <div id="content-menu" class="p-5 space-y-2">
            <a href="#" onclick="toggleSidebar()" class="flex items-center gap-4 p-4 hover:bg-blue-50 rounded-2xl transition font-semibold text-slate-600 group">
                <i class="fas fa-th-large text-blue-500 group-hover:scale-110 transition"></i> Katalog Utama
            </a>
            <a href="#" onclick="toggleSidebar()" class="flex items-center gap-4 p-4 hover:bg-blue-50 rounded-2xl transition font-semibold text-slate-600 group">
                <i class="fas fa-star text-blue-500 group-hover:scale-110 transition"></i> Produk Unggulan
            </a>
            <div class="mt-8 p-6 bg-blue-600 rounded-3xl text-white">
                <p class="text-[10px] font-bold opacity-80 mb-2 uppercase tracking-widest">Butuh Bantuan?</p>
                <p class="text-xs leading-relaxed mb-4">Konsultasikan kebutuhan ikan hias Anda dengan pakar kami.</p>
                <a href="https://wa.me/6285716842806" class="block bg-white text-blue-600 text-center py-3 rounded-xl font-extrabold text-[10px] uppercase tracking-wider">Chat WhatsApp</a>
            </div>
        </div>

        <div id="content-kategori" class="hidden p-5 space-y-1">
            <button onclick="filterKategori('all')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-semibold text-slate-600 flex justify-between items-center group">
                Semua Jenis <i class="fas fa-chevron-right text-[10px] opacity-0 group-hover:opacity-100 transition"></i>
            </button>
            <button onclick="filterKategori('Ikan A')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-semibold text-slate-600 flex justify-between items-center group">
                Ikan A <i class="fas fa-chevron-right text-[10px] opacity-0 group-hover:opacity-100 transition"></i>
            </button>
            </div>
    </aside>

    <main class="mt-24 px-4 max-w-7xl mx-auto pb-24">
        <div class="mb-8 relative max-w-xl mx-auto">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Cari koleksi ikan..." 
                class="w-full pl-14 pr-6 py-4 bg-white rounded-2xl shadow-sm border-none focus:ring-2 focus:ring-blue-400 outline-none transition-all text-sm">
        </div>

        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <div id="loading" class="col-span-full text-center py-24">
                <div class="inline-block animate-spin h-10 w-10 border-[3px] border-blue-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em]">Menghubungkan Database...</p>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxuvBpXU_SizoX3QMNKUojkneDJ4Qnr4t4bd0H7HdffbGpVs_hD9-Ois7wEhIRfYTFFdw/exec";
        let allProducts = [];

        function fetchData() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=handleResponse`;
            document.body.appendChild(script);
        }

        function handleResponse(data) {
            allProducts = data;
            renderProducts(data);
        }

        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';

            if (!data || data.length === 0) {
                grid.innerHTML = "<div class='col-span-full text-center py-20 text-slate-300 text-xs font-bold'>BELUM ADA DATA PRODUK</div>";
                return;
            }

            grid.innerHTML = data.map(p => `
                <div class="product-card group">
                    <div class="h-44 md:h-56 bg-slate-100 relative overflow-hidden">
                        <img src="${p.foto}" onerror="this.src='https://via.placeholder.com/500x500?text=BIIP+AQUATIC'" 
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        <div class="absolute top-3 left-3 bg-blue-600 text-white text-[8px] font-black px-2 py-1 rounded-md shadow-lg uppercase tracking-widest">
                            ${p.kategori || 'Koleksi'}
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-extrabold text-slate-800 text-[11px] md:text-xs uppercase truncate mb-1 tracking-tight">${p.nama}</h3>
                        <p class="text-[9px] text-blue-500 font-bold mb-4 uppercase tracking-widest">${p.jenis || '-'}</p>
                        <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                            <div>
                                <p class="text-[7px] text-slate-400 font-bold uppercase">Harga</p>
                                <div class="text-xs md:text-sm font-black text-slate-900">Rp ${Number(p.harga).toLocaleString('id-ID')}</div>
                            </div>
                            <button onclick="window.open('https://wa.me/6285716842806?text=Halo Admin Biip, saya berminat dengan: ${p.nama}')" 
                                class="bg-blue-600 text-white w-9 h-9 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100 flex items-center justify-center">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        
        function switchTab(tab) {
            const btnMenu = document.getElementById('btn-menu');
            const btnKat = document.getElementById('btn-kategori');
            const cMenu = document.getElementById('content-menu');
            const cKat = document.getElementById('content-kategori');
            
            if(tab === 'menu') {
                btnMenu.classList.add('tab-active'); btnKat.classList.remove('tab-active');
                cMenu.classList.remove('hidden'); cKat.classList.add('hidden');
            } else {
                btnKat.classList.add('tab-active'); btnMenu.classList.remove('tab-active');
                cKat.classList.remove('hidden'); cMenu.classList.add('hidden');
            }
        }

        function searchProduct() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.nama.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function filterKategori(k) {
            const filtered = k === 'all' ? allProducts : allProducts.filter(p => p.kategori === k);
            renderProducts(filtered);
            toggleSidebar();
        }

        window.onload = fetchData;
    </script>
</body>
</html>
