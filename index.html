<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic | Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .view-section { display: none; min-height: 80vh; }
        .view-section.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .floating-wa { position: fixed; bottom: 30px; right: 30px; z-index: 100; transition: 0.3s; }
        .floating-wa:hover { transform: scale(1.1) rotate(5deg); }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .product-card:hover img { transform: scale(1.08); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <a href="https://wa.me/6285716842806" target="_blank" class="floating-wa w-14 h-14 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl shadow-green-300">
        <i class="fab fa-whatsapp"></i>
    </a>

    <header class="fixed top-0 w-full glass-header z-[150] border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-5 h-20 grid grid-cols-3 items-center">
            <div class="flex justify-start">
                <button onclick="toggleSidebar()" class="flex items-center gap-3 px-4 py-2 rounded-xl bg-slate-50 text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition group">
                    <i class="fas fa-bars-staggered text-sm group-hover:rotate-90 transition-transform"></i>
                    <span class="font-bold text-[11px] uppercase tracking-widest hidden md:block">Menu</span>
                </button>
            </div>
            <div class="flex justify-center">
                <div class="flex items-center gap-3 cursor-pointer" onclick="setView('home')">
                    <img src="https://drive.google.com/thumbnail?id=11yE551WgzgTXLZacZXtB7kbKQWtnsgeN&sz=w200" class="h-10 w-auto rounded-lg shadow-sm" alt="Logo">
                    <div class="text-center">
                        <h1 class="font-black text-xs uppercase leading-none tracking-tighter">Biip Flowerhorn</h1>
                        <p class="text-[8px] font-bold text-blue-600 uppercase tracking-widest mt-0.5">Aquatic Store</p>
                    </div>
                </div>
            </div>
            <div class="flex justify-end">
                <button onclick="toggleCart()" class="relative w-12 h-12 flex items-center justify-center bg-slate-900 text-white rounded-2xl shadow-lg shadow-slate-200">
                    <i class="fas fa-shopping-basket text-sm"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-500 text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-bold ring-2 ring-white">0</span>
                </button>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-[#111] sidebar -translate-x-full shadow-2xl z-[200] flex flex-col text-white">
        <div class="p-4 bg-[#111] mt-4">
            <div class="relative">
                <input type="text" onkeyup="searchProduct(this.value)" placeholder="CARI IKAN" class="w-full bg-white p-3 pr-10 rounded text-sm font-bold uppercase outline-none text-slate-900">
                <i class="fas fa-search absolute right-3 top-3.5 text-slate-400"></i>
            </div>
        </div>

        <div class="flex border-b border-white/10">
            <button onclick="switchTab('menu')" id="tab-menu-btn" class="flex-1 py-4 text-[11px] font-black uppercase tracking-widest bg-white/10 border-b-2 border-blue-500">Menu</button>
            <button onclick="switchTab('kategori')" id="tab-kat-btn" class="flex-1 py-4 text-[11px] font-black uppercase tracking-widest text-slate-500 hover:text-white transition">Kategori</button>
        </div>

        <nav class="flex-1 overflow-y-auto">
            <div id="content-menu" class="divide-y divide-white/5">
                <button onclick="setView('home')" class="w-full text-left p-5 text-blue-500 font-bold text-[11px] uppercase tracking-widest hover:bg-white/5 transition">Beranda</button>
                <button onclick="setView('katalog')" class="w-full text-left p-5 font-bold text-[11px] uppercase tracking-widest hover:bg-white/5 transition">Produk</button>
                <button onclick="setView('artikel')" class="w-full text-left p-5 font-bold text-[11px] uppercase tracking-widest hover:bg-white/5 transition flex justify-between items-center">Edukasi <i class="fas fa-chevron-right text-[9px]"></i></button>
                <button onclick="setView('about')" class="w-full text-left p-5 font-bold text-[11px] uppercase tracking-widest hover:bg-white/5 transition flex justify-between items-center">Tentang Kami <i class="fas fa-chevron-right text-[9px]"></i></button>
                <button onclick="setView('kontak')" class="w-full text-left p-5 font-bold text-[11px] uppercase tracking-widest hover:bg-white/5 transition">Kontak</button>
            </div>
            <div id="content-kategori" class="hidden divide-y divide-white/5">
                <div id="category-list-sidebar"></div>
            </div>
        </nav>

        <button onclick="toggleSidebar()" class="p-6 text-center text-slate-500 text-[9px] font-bold uppercase border-t border-white/5 hover:text-white transition">
            <i class="fas fa-times mr-2"></i> Tutup Menu
        </button>
    </aside>

    <main class="mt-28 max-w-7xl mx-auto px-5 pb-20">
        <section id="view-home" class="view-section active">
            <div class="bg-slate-900 rounded-[40px] p-12 mb-16 relative overflow-hidden text-white min-h-[400px] flex items-center shadow-2xl">
                <div class="relative z-10 max-w-xl">
                    <span class="inline-block px-4 py-2 bg-blue-600 rounded-full text-[9px] font-black uppercase tracking-widest mb-6">Premium Selection</span>
                    <h1 class="text-5xl md:text-6xl font-black leading-tight mb-6 uppercase tracking-tighter">High Quality <br><span class="text-blue-500">Flowerhorn</span></h1>
                    <button onclick="setView('katalog')" class="px-10 py-5 bg-white text-slate-900 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-blue-500 hover:text-white transition">Explore Collection</button>
                </div>
            </div>
            <div id="home-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-24"></div>
        </section>

        <section id="view-katalog" class="view-section">
            <h2 class="text-3xl font-black uppercase mb-12 tracking-tighter">Semua <span class="text-blue-600">Koleksi</span></h2>
            <div id="full-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="view-artikel" class="view-section py-10">
            <div id="artikel-container" class="space-y-6 max-w-4xl mx-auto"></div>
        </section>

        <section id="view-about" class="view-section py-10 text-center">
            <h2 class="text-3xl font-black uppercase mb-8">Tentang Kami</h2>
            <p id="about-text" class="text-slate-500 leading-relaxed max-w-3xl mx-auto mb-20 font-medium"></p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-10" id="team-list"></div>
        </section>

        <section id="view-kontak" class="view-section py-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-5xl mx-auto">
                <div class="bg-white p-10 rounded-[40px] shadow-sm border border-slate-100">
                    <input type="text" id="contact-name" placeholder="Nama" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-xs font-bold outline-none">
                    <textarea id="contact-msg" placeholder="Pesan" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 h-32 text-xs font-bold outline-none"></textarea>
                    <button onclick="sendContactWA()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase">Kirim Pesan</button>
                </div>
                <div class="space-y-6">
                    <div class="bg-slate-900 p-8 rounded-[40px] text-white">
                        <p class="text-[10px] text-blue-500 font-bold mb-4 uppercase">Alamat</p>
                        <p id="info-alamat" class="text-xs font-medium text-slate-400"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 text-slate-400 pt-24 pb-12">
        <div class="text-center text-[9px] font-black uppercase tracking-[0.5em]">© 2026 BIIP FLOWERHORN AQUATIC</div>
    </footer>

    <div id="globalModal" class="fixed inset-0 bg-slate-900/95 z-[500] hidden backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[40px] overflow-hidden relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:bg-red-500 hover:text-white transition z-10"><i class="fas fa-times"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="cartDrawer" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-white z-[600] translate-x-full transition-transform shadow-2xl flex flex-col">
        <div class="p-8 bg-slate-900 text-white flex justify-between items-center">
            <h3 class="font-black uppercase tracking-widest text-xs">Keranjang</h3>
            <button onclick="toggleCart()" class="text-white"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-8 bg-slate-50/50"></div>
        <div class="p-8 border-t bg-white">
            <div class="flex justify-between items-center mb-8 font-black">
                <span class="text-[10px] text-slate-400 uppercase">Total</span>
                <span id="cartTotal" class="text-blue-600 text-xl">Rp 0</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full py-6 bg-green-500 text-white rounded-3xl font-black uppercase text-xs">Checkout WA</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzmwqGzWZdQNn6PNx0fzjzvkHcn_zmgPQKzhNji_IIWsk348hZz_wPywGvSo3YflSuoTg/exec";
        let store = { ikan: [], artikel: [], ulasan: [], pegawai: [], kontak: [] };
        let cart = [];

        async function init() {
            document.getElementById('about-text').innerText = "Biip flowerhorn aquatic berdiri sejak 2020, didirikan oleh owner Badarudin. Berkomitmen kuat dalam menjaga kualitas genetik ikan.";
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=render`;
            document.body.appendChild(script);
        }

        function render(data) {
            store = data;
            if(data.ikan) {
                drawGrid(data.ikan.slice(0, 4), 'home-grid');
                drawGrid(data.ikan, 'full-grid');
                drawCategories(data.ikan);
            }
            if(data.artikel) drawArtikel(data.artikel);
            if(data.pegawai) drawTeam(data.pegawai);
            if(data.kontak && data.kontak[0]) {
                document.getElementById('info-alamat').innerText = data.kontak[0].alamat;
            }
        }

        function drawGrid(items, targetId) {
            const grid = document.getElementById(targetId);
            if(!grid) return;
            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-[32px] border border-slate-100 overflow-hidden group shadow-sm hover:shadow-xl transition-all">
                    <div class="h-44 md:h-64 overflow-hidden relative cursor-pointer" onclick="showProductDetail('${p.nama}')">
                        <img src="${p.foto}" class="w-full h-full object-cover transition duration-700 hover:scale-110">
                    </div>
                    <div class="p-6">
                        <h3 class="font-black text-[11px] uppercase mb-1">${p.nama}</h3>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-50 mt-4">
                            <span class="text-xs font-black">Rp ${Number(p.harga).toLocaleString()}</span>
                            <button onclick="addToCart('${p.nama}', ${p.harga}, '${p.foto}')" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-blue-600 transition"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function drawCategories(items) {
            const uniqueCats = [...new Set(items.map(i => i.kategori))];
            const catContainer = document.getElementById('category-list-sidebar');
            if(!catContainer) return;
            catContainer.innerHTML = uniqueCats.map(c => `
                <button onclick="filterByCategory('${c}')" class="w-full text-left p-5 text-white font-bold text-[11px] uppercase tracking-widest hover:bg-white/5 transition flex justify-between items-center border-b border-white/5">
                    ${c} <i class="fas fa-chevron-right text-[9px] text-slate-500"></i>
                </button>
            `).join('');
        }

        function switchTab(type) {
            const menuBtn = document.getElementById('tab-menu-btn');
            const katBtn = document.getElementById('tab-kat-btn');
            const menuContent = document.getElementById('content-menu');
            const katContent = document.getElementById('content-kategori');

            if(type === 'menu') {
                menuBtn.classList.add('bg-white/10', 'border-blue-500');
                katBtn.classList.remove('bg-white/10', 'border-blue-500');
                menuContent.classList.remove('hidden');
                katContent.classList.add('hidden');
            } else {
                katBtn.classList.add('bg-white/10', 'border-blue-500');
                menuBtn.classList.remove('bg-white/10', 'border-blue-500');
                katContent.classList.remove('hidden');
                menuContent.classList.add('hidden');
            }
        }

        function filterByCategory(c) {
            const filtered = store.ikan.filter(i => i.kategori === c);
            drawGrid(filtered, 'full-grid');
            setView('katalog');
            toggleSidebar();
        }

        function setView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            if(!document.getElementById('sidebar').classList.contains('-translate-x-full')) toggleSidebar();
            window.scrollTo(0,0);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('translate-x-full'); }
        function closeModal() { document.getElementById('globalModal').classList.add('hidden'); }

        function addToCart(name, price, img) {
            const existing = cart.find(c => c.name === name);
            if(existing) existing.qty++; else cart.push({name, price, img, qty: 1});
            updateCart();
            if(document.getElementById('cartDrawer').classList.contains('translate-x-full')) toggleCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
            let total = 0;
            document.getElementById('cartItems').innerHTML = cart.length ? cart.map((i, idx) => {
                total += (i.price * i.qty);
                return `<div class="flex items-center gap-4 p-4 bg-white rounded-2xl mb-3 shadow-sm border border-slate-50">
                    <img src="${i.img}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1"><p class="text-[10px] font-black uppercase truncate w-32">${i.name}</p></div>
                    <button onclick="removeFromCart(${idx})" class="text-red-400 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>`;
            }).join('') : `<p class="text-center text-slate-300 py-10 font-bold text-[10px] uppercase">Kosong</p>`;
            document.getElementById('cartTotal').innerText = `Rp ${total.toLocaleString()}`;
        }

        function removeFromCart(idx) { cart.splice(idx, 1); updateCart(); }

        function showProductDetail(name) {
            const p = store.ikan.find(i => i.nama === name);
            if(!p) return;
            document.getElementById('modalContent').innerHTML = `
                <img src="${p.foto}" class="w-full h-[350px] object-cover">
                <div class="p-8">
                    <h2 class="text-2xl font-black uppercase mb-2">${p.nama}</h2>
                    <p class="text-blue-600 font-bold text-xs uppercase mb-6">${p.kategori}</p>
                    <button onclick="addToCart('${p.nama}', ${p.harga}, '${p.foto}'); closeModal();" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs">Tambah Ke Keranjang</button>
                </div>
            `;
            document.getElementById('globalModal').classList.remove('hidden');
        }

        function drawArtikel(items) {
            document.getElementById('artikel-container').innerHTML = items.map(a => `
                <div class="bg-white p-6 rounded-[35px] border border-slate-100 flex gap-6 items-center cursor-pointer shadow-sm" onclick="showArticleDetail('${a.judul}')">
                    <img src="${a.foto}" class="w-32 h-32 rounded-3xl object-cover shadow-lg">
                    <div>
                        <h3 class="text-lg font-black uppercase mb-2">${a.judul}</h3>
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Baca Selengkapnya</span>
                    </div>
                </div>
            `).join('');
        }

        function showArticleDetail(judul) {
            const a = store.artikel.find(i => i.judul === judul);
            if(!a) return;
            document.getElementById('modalContent').innerHTML = `
                <img src="${a.foto}" class="w-full h-64 object-cover">
                <div class="p-8"><h2 class="text-2xl font-black uppercase mb-6">${a.judul}</h2><p class="text-slate-600 text-sm italic leading-relaxed whitespace-pre-wrap">${a.isi}</p></div>
            `;
            document.getElementById('globalModal').classList.remove('hidden');
        }

        function drawTeam(items) {
            document.getElementById('team-list').innerHTML = items.map(p => `
                <div class="text-center"><img src="${p.foto}" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover shadow-lg grayscale hover:grayscale-0 transition">
                <p class="font-black text-[10px] uppercase">${p.nama}</p><p class="text-[8px] text-blue-500 font-bold uppercase">${p.jabatan}</p></div>
            `).join('');
        }

        function checkoutWhatsApp() {
            if(!cart.length) return;
            let list = cart.map(i => `*${i.name}* (${i.qty}x)`).join('\n');
            window.open(`https://wa.me/6285716842806?text=Order:\n${list}`);
        }

        function sendContactWA() {
            const n = document.getElementById('contact-name').value;
            const m = document.getElementById('contact-msg').value;
            if(n && m) window.open(`https://wa.me/6285716842806?text=Nama: ${n}%0APesan: ${m}`);
        }

        function searchProduct(q) {
            const filtered = store.ikan.filter(i => i.nama.toLowerCase().includes(q.toLowerCase()));
            drawGrid(filtered, 'home-grid');
        }

        window.onload = init;
    </script>
</body>
</html>
