<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Modak&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');

        /* POIN 1: Bubble Font Orisinal */
        .bubble-brand {
            font-family: 'Modak', cursive;
            color: white;
            -webkit-text-stroke: 1.2px #ef4444;
            text-shadow: 3px 3px 0px #ef4444;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }

        /* POIN 2: Dashboard Design */
        .nav-bg { background-color: #bae6fd; }
        .hero-banner { background-color: #f3f4f6; height: 380px; display: flex; align-items: center; justify-content: center; text-align: center; }

        .page { display: none; padding-top: 100px; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        /* Sidebar Samping */
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5000; box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
        .sidebar.open { left: 0; }

        .wa-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 4000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="font-['Plus_Jakarta_Sans']">

    <header class="fixed top-0 w-full z-[4500] nav-bg shadow-sm py-3 px-6 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="text-2xl p-2 hover:bg-white/50 rounded-xl transition"><i class="fas fa-bars"></i></button>
        <div class="flex items-center gap-3">
            <img src="https://drive.google.com/uc?export=view&id=11yE551WgzgTXLZacZXtB7kbKQWtnsgeN" class="h-10 w-auto" alt="Logo">
            <h1 class="bubble-brand">Biip flowerhorn aquatic</h1>
        </div>
        <button onclick="toggleCart()" class="text-2xl p-2 relative">
            <i class="fas fa-shopping-basket"></i>
            <span id="cart-count" class="absolute top-1 right-1 bg-red-500 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
        </button>
    </header>

    <nav id="sidebar" class="sidebar p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Biipsite Menu</span>
            <button onclick="toggleSidebar()"><i class="fas fa-times text-gray-400"></i></button>
        </div>
        
        <div class="space-y-2">
            <button onclick="navTo('home')" class="w-full text-left p-4 font-bold rounded-2xl hover:bg-blue-50 transition">Beranda</button>
            <button onclick="navTo('produk')" class="w-full text-left p-4 font-bold rounded-2xl hover:bg-blue-50 transition">Katalog Ikan</button>
            <button onclick="navTo('artikel')" class="w-full text-left p-4 font-bold rounded-2xl hover:bg-blue-50 transition">Informasi Edukasi</button>
            <button onclick="navTo('about')" class="w-full text-left p-4 font-bold rounded-2xl hover:bg-blue-50 transition">Tentang Biip</button>
            <div class="pt-10 border-t mt-10">
                <button onclick="navTo('login')" class="w-full text-left p-4 font-black text-blue-600 bg-blue-50 rounded-2xl">LOGIN PEMBELI</button>
            </div>
        </div>
    </nav>

    <main>
        <section id="home" class="page active">
            <div class="hero-banner">
                <h2 id="hero-text" class="text-3xl md:text-5xl font-black text-gray-400 italic px-10">BELANJA ONLINE TIDAK PERLU CEMAS</h2>
            </div>
            
            <div class="max-w-4xl mx-auto py-20 px-6 text-center">
                <h3 class="text-2xl font-black mb-12 italic border-b-2 inline-block">ULASAN TERBARU</h3>
                <div id="ulasan-list" class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left"></div>
            </div>
        </section>

        <section id="produk" class="page px-6">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-black italic">KOLEKSI LOUHAN</h2>
                    <input type="text" onkeyup="searchFish(this.value)" placeholder="Cari..." class="p-3 bg-gray-100 rounded-xl outline-none w-48">
                </div>
                <div id="ikan-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>
        </section>

        <section id="artikel" class="page px-6">
            <div id="artikel-list" class="max-w-4xl mx-auto space-y-8 py-10"></div>
        </section>

        <section id="login" class="page px-6 flex items-center justify-center">
            <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-sm border-t-8 border-blue-400">
                <h2 class="text-2xl font-black mb-8 text-center">MASUK AKUN</h2>
                <div class="space-y-4">
                    <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                    <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                    <button onclick="loginProcess()" class="w-full bg-blue-500 text-white p-4 rounded-2xl font-black">LOGIN</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-[#111827] text-gray-500 py-16 px-6 mt-20">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 text-sm font-bold uppercase tracking-wider">
            <div><h4 class="text-blue-400 mb-4">Support</h4><p>Panduan Belanja<br>Garansi Ikan</p></div>
            <div><h4 class="text-blue-400 mb-4">Alamat</h4><p>Kp. Rocek Barat, Pandeglang, Banten</p></div>
            <div class="md:text-right"><p class="italic">Biip Flowerhorn Aquatic © 2026</p></div>
        </div>
    </footer>

    <a href="https://wa.me/6285716842806" class="wa-float"><i class="fab fa-whatsapp"></i></a>
    
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-80 bg-white z-[6000] shadow-2xl translate-x-full transition-transform duration-300 p-8 flex flex-col">
        <h3 class="font-black border-b pb-4 mb-6">DAFTAR BELANJA</h3>
        <div id="cart-content" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t mt-6">
            <div class="flex justify-between font-black mb-6"><span>TOTAL</span><span id="total-price" class="text-red-500">Rp 0</span></div>
            <button onclick="kirimWA()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black">ORDER VIA WHATSAPP</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXcAz9LS2WJAm40vgwdaZtwb8xODQanig-aKPobk7f4a2zyVQZmqirZAtB76AowARewA/exec";
        let MASTER_DATA = { produk: [], artikel: [], ulasan: [] };
        let MY_CART = [];

        window.onload = () => {
            loadData();
            // Banner Cycle
            const phrases = ["BELANJA ONLINE TIDAK PERLU CEMAS", "BELANJA IKAN HIAS SEMUDAH INI"];
            let idx = 0;
            setInterval(() => {
                idx = (idx + 1) % phrases.length;
                document.getElementById('hero-text').innerText = phrases[idx];
            }, 4000);
        };

        function loadData() {
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?callback=initApp`;
            document.body.appendChild(s);
        }

        function initApp(res) {
            MASTER_DATA = res;
            renderProduk(res.produk);
            renderArtikel(res.artikel);
            renderUlasan(res.ulasan);
        }

        function renderProduk(items) {
            document.getElementById('ikan-grid').innerHTML = items.map((p, i) => `
                <div class="bg-white rounded-[35px] shadow-sm border p-2 hover:shadow-xl transition duration-300">
                    <img src="${p.foto}" class="w-full h-40 object-cover rounded-[30px] mb-4">
                    <div class="px-3 pb-3">
                        <h4 class="font-black text-[11px] uppercase truncate">${p.nama}</h4>
                        <p class="text-[9px] text-gray-400 font-bold mb-3">${p.jenis} | ${p.kategori}</p>
                        <div class="flex justify-between items-center">
                            <span class="font-black text-red-500 text-xs">Rp ${Number(p.harga).toLocaleString()}</span>
                            <button onclick="addCart(${i})" class="bg-blue-500 text-white w-8 h-8 rounded-xl"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderArtikel(items) {
            document.getElementById('artikel-list').innerHTML = items.map(a => `
                <div class="bg-white p-6 rounded-[35px] shadow-md flex gap-6 items-center border">
                    <img src="${a.foto}" class="w-24 h-24 rounded-[25px] object-cover">
                    <div>
                        <h4 class="font-black text-blue-600 uppercase mb-2">${a.judul}</h4>
                        <p class="text-xs text-gray-500 line-clamp-2 italic">${a.isi}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderUlasan(items) {
            document.getElementById('ulasan-list').innerHTML = items.slice(-3).map(u => `
                <div class="bg-gray-50 p-6 rounded-3xl">
                    <div class="flex justify-between mb-4"><span class="font-black text-[10px]">${u.nama}</span><span class="text-yellow-400">${'★'.repeat(u.bintang)}</span></div>
                    <p class="text-[11px] italic leading-relaxed text-gray-500">"${u.komentar}"</p>
                </div>
            `).join('');
        }

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('translate-x-full'); }

        function addCart(i) {
            MY_CART.push(MASTER_DATA.produk[i]);
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = MY_CART.length;
            const total = MY_CART.reduce((s, it) => s + Number(it.harga), 0);
            document.getElementById('total-price').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('cart-content').innerHTML = MY_CART.map((it, idx) => `
                <div class="flex justify-between bg-gray-50 p-4 rounded-2xl">
                    <span class="text-xs font-bold">${it.nama}</span>
                    <button onclick="MY_CART.splice(${idx},1); updateCartUI();" class="text-red-300"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function kirimWA() {
            if(MY_CART.length === 0) return;
            let m = "*ORDER BIIP FLOWERHORN*\n\n";
            MY_CART.forEach((it, i) => m += `${i+1}. ${it.nama} - Rp ${Number(it.harga).toLocaleString()}\n`);
            m += `\n*TOTAL: ${document.getElementById('total-price').innerText}*`;
            window.open(`https://wa.me/6285716842806?text=${encodeURIComponent(m)}`);
        }
    </script>
</body>
</html>
