<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic | Official Branch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .card-elegant { background: white; border-radius: 24px; border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .card-elegant:hover { transform: translateY(-5px); shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-slate-800">

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-7xl mx-auto py-3 px-4 flex justify-between items-center border-b border-blue-50">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-blue-600 text-xl p-2 hover:bg-blue-50 rounded-xl transition">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">B</div>
                    <div class="flex flex-col leading-none">
                        <span class="font-extrabold text-blue-900 text-[11px] md:text-sm uppercase tracking-tighter">Biip Flowerhorn</span>
                        <span class="text-[8px] md:text-[10px] text-blue-500 font-bold uppercase tracking-widest mt-1">Aquatic Branch</span>
                    </div>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-2 text-slate-400">
                <i class="fas fa-map-marker-alt text-red-500 text-xs"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Pandeglang, Banten</span>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white sidebar -translate-x-full shadow-2xl flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <span class="font-bold text-[10px] uppercase tracking-widest text-slate-400">Navigation Menu</span>
            <button onclick="toggleSidebar()" class="text-slate-300 hover:text-red-500 transition text-xl"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="flex border-b text-center cursor-pointer bg-white">
            <div onclick="switchSidebarTab('menu')" id="side-btn-menu" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest tab-active">Utama</div>
            <div onclick="switchSidebarTab('kategori')" id="side-btn-kategori" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest text-slate-400">Ikan</div>
        </div>
        
        <div id="side-content-menu" class="p-5 space-y-2">
            <button onclick="showSection('produk')" class="w-full flex items-center gap-4 p-4 hover:bg-blue-50 rounded-2xl transition font-semibold text-slate-600 group">
                <i class="fas fa-fish text-blue-500 group-hover:scale-110 transition"></i> Katalog Produk
            </button>
            <button onclick="showSection('artikel')" class="w-full flex items-center gap-4 p-4 hover:bg-blue-50 rounded-2xl transition font-semibold text-slate-600 group">
                <i class="fas fa-book-open text-blue-500 group-hover:scale-110 transition"></i> Informasi & Artikel
            </button>
            <hr class="my-4 border-slate-100">
            <a href="https://wa.me/6285716842806" class="flex items-center gap-4 p-4 hover:bg-green-50 rounded-2xl transition font-semibold text-slate-600">
                <i class="fab fa-whatsapp text-green-500"></i> Hubungi Admin
            </a>
        </div>

        <div id="side-content-kategori" class="hidden p-5 space-y-1">
            <button onclick="filterKategori('all')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-slate-600 text-sm">Semua Koleksi</button>
            <div id="dynamic-categories">
                </div>
        </div>
    </aside>

    <main class="mt-24 px-4 max-w-7xl mx-auto pb-24">
        
        <section id="section-produk">
            <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Katalog Koleksi</h2>
                <div class="relative flex-1 max-w-md">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                    <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Cari ikan..." class="w-full pl-12 pr-4 py-3 bg-white rounded-2xl border-none shadow-sm text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
            </div>
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <div id="loading-produk" class="col-span-full text-center py-20">
                    <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Sinkronisasi Produk...</p>
                </div>
            </div>
        </section>

        <section id="section-artikel" class="hidden">
            <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter mb-8 text-center">Edukasi & Informasi</h2>
            <div id="artikelGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwy7ERRZuVd4pir2WN8u-kZZe1by7pQ53Is_k_pdulGocdTaI4xj60ZCO7yi8O9OgFY5w/exec";
        let allData = { produk: [], artikel: [] };

        function fetchData() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=handleResponse`;
            document.body.appendChild(script);
        }

        function handleResponse(data) {
            allData = data;
            renderProducts(data.produk);
            renderArtikel(data.artikel);
            generateCategoryButtons(data.produk);
        }

        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            document.getElementById('loading-produk').style.display = 'none';

            grid.innerHTML = data.map(p => `
                <div class="card-elegant group">
                    <div class="h-40 md:h-52 bg-slate-100 relative overflow-hidden rounded-t-[24px]">
                        <img src="${p.foto}" onerror="this.src='https://via.placeholder.com/500x500?text=BIIP+AQUATIC'" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute top-3 left-3 bg-blue-600 text-white text-[8px] font-black px-2 py-1 rounded shadow-lg uppercase">${p.kategori}</div>
                        ${p.stock < 1 ? '<div class="absolute inset-0 bg-black/50 flex items-center justify-center text-white font-bold text-xs uppercase">Habis</div>' : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-slate-800 text-[11px] md:text-xs uppercase truncate mb-1">${p.nama}</h3>
                        <p class="text-[9px] text-blue-500 font-bold mb-3 uppercase tracking-widest">${p.jenis}</p>
                        <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                            <div>
                                <p class="text-[7px] text-slate-400 font-bold uppercase">Harga</p>
                                <div class="text-xs md:text-sm font-black text-slate-900">Rp ${Number(p.harga).toLocaleString('id-ID')}</div>
                            </div>
                            <button onclick="window.open('https://wa.me/6285716842806?text=Halo Admin, saya pesan: ${p.nama}')" 
                                class="bg-blue-600 text-white w-9 h-9 rounded-xl hover:bg-slate-900 transition flex items-center justify-center shadow-lg shadow-blue-100">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderArtikel(data) {
            const grid = document.getElementById('artikelGrid');
            grid.innerHTML = data.map(a => `
                <div class="card-elegant p-4 flex flex-col md:flex-row gap-4">
                    <img src="${a.foto}" class="w-full md:w-32 h-32 object-cover rounded-2xl bg-slate-100">
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800 mb-2 uppercase text-sm">${a.judul}</h3>
                        <p class="text-xs text-slate-500 leading-relaxed line-clamp-3">${a.isi}</p>
                        <button class="mt-4 text-blue-600 font-bold text-[10px] uppercase tracking-widest">Baca Selengkapnya</button>
                    </div>
                </div>
            `).join('');
        }

        function generateCategoryButtons(produk) {
            const container = document.getElementById('dynamic-categories');
            const categories = [...new Set(produk.map(p => p.kategori))];
            container.innerHTML = categories.map(cat => `
                <button onclick="filterKategori('${cat}')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-slate-600 text-sm border-b border-slate-50">${cat}</button>
            `).join('');
        }

        function showSection(section) {
            document.getElementById('section-produk').classList.toggle('hidden', section !== 'produk');
            document.getElementById('section-artikel').classList.toggle('hidden', section !== 'artikel');
            toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function switchSidebarTab(tab) {
            const btnMenu = document.getElementById('side-btn-menu');
            const btnKat = document.getElementById('side-btn-kategori');
            const cMenu = document.getElementById('side-content-menu');
            const cKat = document.getElementById('side-content-kategori');
            
            if(tab === 'menu') {
                btnMenu.classList.add('tab-active'); btnKat.classList.remove('tab-active');
                cMenu.classList.remove('hidden'); cKat.classList.add('hidden');
            } else {
                btnKat.classList.add('tab-active'); btnMenu.classList.remove('tab-active');
                cKat.classList.remove('hidden'); cMenu.classList.add('hidden');
            }
        }

        function searchProduct() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.produk.filter(p => p.nama.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function filterKategori(k) {
            const filtered = k === 'all' ? allData.produk : allData.produk.filter(p => p.kategori === k);
            renderProducts(filtered);
            showSection('produk');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
