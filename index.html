<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biip Flowerhorn Aquatic | Branch Office</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .card-custom { background: white; border-radius: 20px; border: 1px solid #f1f5f9; overflow: hidden; transition: all 0.3s ease; }
        .card-custom:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800">

    <header class="fixed top-0 w-full glass-header border-b border-slate-100 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-blue-600 p-2 hover:bg-blue-50 rounded-xl transition">
                    <i class="fas fa-bars-staggered text-xl"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-100 text-lg">B</div>
                    <div class="flex flex-col leading-none">
                        <span class="font-black text-slate-900 text-[11px] md:text-sm uppercase tracking-tighter">Biip Flowerhorn</span>
                        <span class="text-[8px] md:text-[10px] text-blue-500 font-bold uppercase tracking-widest mt-1">Aquatic Branch</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden md:flex flex-col items-end mr-2">
                    <span class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">Workshop</span>
                    <span class="text-[10px] font-bold">Pandeglang, Banten</span>
                </div>
                <button class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center relative">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] px-1.5 py-0.5 rounded-full font-bold border-2 border-white hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white sidebar -translate-x-full shadow-2xl flex flex-col pt-4">
        <div class="px-6 py-4 flex justify-between items-center border-b bg-slate-50">
            <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] text-center w-full">Navigation Menu</h2>
        </div>
        
        <div class="flex border-b text-[10px] font-bold uppercase tracking-widest cursor-pointer bg-white">
            <div onclick="switchSideTab('utama')" id="tab-utama" class="flex-1 py-4 text-center tab-active">Utama</div>
            <div onclick="switchSideTab('ikan')" id="tab-ikan" class="flex-1 py-4 text-center text-slate-400">Kategori</div>
        </div>

        <div id="side-utama" class="p-5 space-y-2 overflow-y-auto">
            <button onclick="showView('katalog')" class="w-full flex items-center gap-4 p-4 hover:bg-blue-50 rounded-2xl transition font-bold text-slate-600 group text-sm">
                <i class="fas fa-th-large text-blue-500 group-hover:rotate-6 transition"></i> Katalog Ikan
            </button>
            <button onclick="showView('artikel')" class="w-full flex items-center gap-4 p-4 hover:bg-blue-50 rounded-2xl transition font-bold text-slate-600 group text-sm">
                <i class="fas fa-newspaper text-blue-500 group-hover:rotate-6 transition"></i> Artikel Edukasi
            </button>
            <div class="pt-8">
                <div class="p-6 bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl text-white shadow-xl">
                    <p class="text-[9px] font-bold opacity-70 uppercase mb-2 tracking-widest">Informasi Cabang</p>
                    <p class="text-xs font-semibold leading-relaxed">Kp. Rocek Barat, Pandeglang - Banten. Melayani pengiriman Nasional.</p>
                </div>
            </div>
        </div>

        <div id="side-ikan" class="hidden p-5 space-y-1 overflow-y-auto">
            <button onclick="filterKategori('all')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-slate-600 text-xs uppercase tracking-widest">Semua Jenis</button>
            <div id="category-container"></div>
        </div>
    </aside>

    <main class="mt-24 px-4 max-w-7xl mx-auto pb-24">
        
        <section id="view-katalog">
            <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Katalog <span class="text-blue-600">Terbaru</span></h2>
                <div class="relative flex-1 max-w-md">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Cari ikan kesukaanmu..." class="w-full pl-12 pr-4 py-3 bg-white rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-100 outline-none text-sm transition-all">
                </div>
            </div>
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <div id="loading-produk" class="col-span-full text-center py-24">
                    <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em]">Memuat Data Ikan...</p>
                </div>
            </div>
        </section>

        <section id="view-artikel" class="hidden">
            <div class="text-center mb-10">
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Edukasi & <span class="text-blue-600">Info</span></h2>
                <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Tips perawatan dan info terbaru</p>
            </div>
            <div id="artikelGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjPmpZqCx9_WDAk9PHCgrir0B-Zzn2T8ieGsnOnGUACxhaq9SFOAD_fXaAtDb5wwa9Mg/exec";
        let allData = { produk: [], artikel: [] };

        function fetchData() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=handleResponse`;
            document.body.appendChild(script);
        }

        function handleResponse(data) {
            allData = data;
            renderProducts(data.produk);
            renderArtikel(data.artikel);
            renderCategories(data.produk);
        }

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            document.getElementById('loading-produk').style.display = 'none';

            if (!items || items.length === 0) {
                grid.innerHTML = "<div class='col-span-full text-center py-20 text-slate-300 font-bold text-[10px] uppercase tracking-widest'>Data Ikan Belum Tersedia</div>";
                return;
            }

            grid.innerHTML = items.map(p => `
                <div class="card-custom group">
                    <div class="h-44 md:h-56 bg-slate-100 relative overflow-hidden">
                        <img src="${p.foto}" onerror="this.src='https://via.placeholder.com/500x500?text=BIIP+AQUATIC'" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute top-3 left-3 bg-blue-600 text-white text-[8px] font-black px-2 py-1 rounded shadow-lg uppercase tracking-widest">${p.kategori}</div>
                        ${p.stock < 1 ? '<div class="absolute inset-0 bg-black/60 flex items-center justify-center text-white font-bold text-[10px] uppercase tracking-widest">Sold Out</div>' : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-extrabold text-slate-800 text-[11px] md:text-xs uppercase truncate mb-1 tracking-tight">${p.nama}</h3>
                        <p class="text-[9px] text-blue-500 font-bold mb-4 uppercase tracking-widest">${p.jenis || '-'}</p>
                        <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                            <div>
                                <p class="text-[7px] text-slate-400 font-bold uppercase tracking-tighter">Harga</p>
                                <div class="text-xs md:text-sm font-black text-slate-900">Rp ${Number(p.harga).toLocaleString('id-ID')}</div>
                            </div>
                            <button onclick="pesanIkan('${p.nama}', '${p.harga}')" 
                                class="bg-blue-600 text-white w-9 h-9 rounded-xl hover:bg-slate-900 transition-all flex items-center justify-center shadow-lg shadow-blue-100">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderArtikel(items) {
            const grid = document.getElementById('artikelGrid');
            if (!items || items.length === 0) return;

            grid.innerHTML = items.map(a => `
                <div class="card-custom p-4 flex gap-4 md:gap-6 items-start">
                    <img src="${a.foto}" class="w-24 h-24 md:w-32 md:h-32 object-cover rounded-2xl bg-slate-50">
                    <div class="flex-1">
                        <h3 class="font-black text-slate-800 text-xs md:text-sm uppercase mb-2 leading-tight">${a.judul}</h3>
                        <p class="text-[10px] md:text-xs text-slate-500 leading-relaxed line-clamp-3">${a.isi}</p>
                        <button class="mt-4 text-blue-600 font-bold text-[9px] uppercase tracking-widest flex items-center gap-2">
                            Selengkapnya <i class="fas fa-arrow-right text-[8px]"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories(produk) {
            const container = document.getElementById('category-container');
            const cats = [...new Set(produk.map(p => p.kategori))];
            container.innerHTML = cats.map(c => `
                <button onclick="filterKategori('${c}')" class="w-full text-left p-4 hover:bg-blue-50 rounded-xl font-bold text-slate-600 text-[10px] uppercase tracking-widest border-b border-slate-50">${c}</button>
            `).join('');
        }

        function pesanIkan(nama, harga) {
            const pesan = `Halo Admin Biip Flowerhorn, saya berminat memesan: %0A- Produk: ${nama}%0A- Harga: Rp ${Number(harga).toLocaleString('id-ID')}%0AMohon info ketersediaan stoknya. Terima kasih.`;
            window.open(`https://wa.me/6285716842806?text=${pesan}`);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function switchSideTab(target) {
            const isUtama = target === 'utama';
            document.getElementById('tab-utama').className = isUtama ? 'flex-1 py-4 text-center tab-active' : 'flex-1 py-4 text-center text-slate-400';
            document.getElementById('tab-ikan').className = !isUtama ? 'flex-1 py-4 text-center tab-active' : 'flex-1 py-4 text-center text-slate-400';
            document.getElementById('side-utama').classList.toggle('hidden', !isUtama);
            document.getElementById('side-ikan').classList.toggle('hidden', isUtama);
        }

        function showView(target) {
            document.getElementById('view-katalog').classList.toggle('hidden', target !== 'katalog');
            document.getElementById('view-artikel').classList.toggle('hidden', target !== 'artikel');
            toggleSidebar();
        }

        function searchProduct() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.produk.filter(p => p.nama.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function filterKategori(cat) {
            const filtered = cat === 'all' ? allData.produk : allData.produk.filter(p => p.kategori === cat);
            renderProducts(filtered);
            showView('katalog');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
